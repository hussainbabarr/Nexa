<!DOCTYPE html>
<html lang="en" class="dark"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaAI | Titan Core v5.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --bg: #f8fafc; --panel: #ffffff; --text-main: #1e293b; 
            --accent: #2563eb; --border: rgba(0,0,0,0.06); --dropdown-bg: #f1f5f9;
        }

        .dark { 
            --bg: #0f172a; --panel: #1e293b; --text-main: #f1f5f9; 
            --accent: #3b82f6; --border: rgba(255,255,255,0.1); --dropdown-bg: #334155;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); 
            color: var(--text-main); margin: 0; display: flex; align-items: center; 
            justify-content: center; height: 100vh; overflow: hidden; transition: 0.3s;
        }
        
        .app-shell { 
            width: 96vw; height: 94vh; background: var(--panel); border-radius: 40px; 
            display: flex; overflow: hidden; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.1); 
            border: 1px solid var(--border); position: relative;
        }

        /* Overlay for Login */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }

        .sidebar { width: 320px; border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .identity-select {
            background: var(--dropdown-bg); color: var(--text-main); 
            padding: 12px 15px; border-radius: 15px; width: 100%; 
            border: 1px solid var(--border); font-weight: 700; outline: none; cursor: pointer;
        }

        .history-item {
            padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: 0.2s; border: 1px solid transparent;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            background: var(--dropdown-bg); opacity: 0.8;
        }
        .history-item:hover { opacity: 1; border-color: var(--accent); }

        .main-workspace { flex: 1; display: flex; flex-direction: column; background: var(--panel); }
        .header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .chat-stream { flex: 1; overflow-y: auto; padding: 30px 40px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }

        .bubble { max-width: 80%; padding: 16px 20px; border-radius: 22px; font-weight: 500; line-height: 1.6; font-size: 14.5px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .ai-bubble { background: var(--dropdown-bg); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-bubble { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        
        .input-dock { padding: 20px 40px 30px; }
        .input-pill {
            background: var(--dropdown-bg); border: 1px solid var(--border); border-radius: 30px;
            padding: 6px 8px 6px 20px; display: flex; align-items: center; gap: 12px;
        }
        .input-pill input { flex: 1; background: transparent; border: none; outline: none; font-weight: 600; color: var(--text-main); height: 45px; }

        .send-btn { 
            background: var(--accent); color: white; width: 44px; height: 44px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border: none; transition: 0.2s;
        }

        .id-circle { width: 42px; height: 42px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        
        #user-settings-modal {
            position: absolute; right: 40px; top: 80px; width: 280px;
            background: var(--panel); border-radius: 30px; padding: 25px; 
            display: none; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.2); z-index: 100;
        }

        .auth-card {
            background: var(--panel); padding: 40px; border-radius: 35px;
            width: 100%; max-width: 400px; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .auth-input {
            width: 100%; background: var(--dropdown-bg); border: 1px solid var(--border);
            padding: 14px; border-radius: 15px; margin-bottom: 12px; font-size: 14px;
            outline: none; color: var(--text-main); font-weight: 600;
        }

        .gen-image { border-radius: 15px; margin-top: 10px; width: 100%; max-width: 400px; border: 2px solid var(--accent); }
    </style>
</head>
<body class="dark">

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="flex flex-col items-center mb-8">
                <div class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center font-black text-2xl mb-4">NX</div>
                <h2 id="auth-ui-title" class="text-2xl font-black">Welcome Back</h2>
                <p class="text-slate-400 text-sm font-medium">Access Nexa Titan Core</p>
            </div>
            
            <div id="signup-fields" class="hidden">
                <input type="text" id="reg-name" placeholder="Full Name" class="auth-input">
            </div>
            <input type="email" id="auth-email" placeholder="Email Address" class="auth-input">
            <input type="password" id="auth-pass" placeholder="Password" class="auth-input">
            
            <button onclick="handleAuth()" id="auth-main-btn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-sm mb-6 hover:bg-blue-700 transition shadow-lg shadow-blue-500/30">Login System</button>
            
            <p class="text-center text-xs text-slate-400 font-bold">
                <span id="auth-switch-text">New to Nexa?</span> 
                <a href="javascript:void(0)" onclick="toggleAuthUI()" id="auth-switch-link" class="text-blue-500 ml-1">Create Account</a>
            </p>
        </div>
    </div>

    <div class="app-shell" id="main-app" style="visibility: hidden;">
        <aside class="sidebar">
            <div class="flex items-center gap-3 mb-4">
                <div class="bg-blue-600 text-white w-11 h-11 rounded-2xl flex items-center justify-center font-black text-lg">NX</div>
                <h1 class="font-extrabold text-lg">NexaAI</h1>
            </div>

            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">System Identity</label>
            <select class="identity-select" id="persona" onchange="handlePersonaChange(this.value)">
                <option value="Professional Mode. Concise and smart.">💼 Professional AI (Paid)</option>
                <option value="Friendly Mode. Helpful and warm." selected>🤝 Friendly AI</option>
                <option value="Creative Mode. Bold and imaginative.">🎨 Creative Mode</option>
            </select>

            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-4">Recent Conversations</label>
            <div id="history-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>

            <button onclick="clearHistory()" class="mt-auto p-4 bg-red-50 dark:bg-red-900/10 text-red-500 rounded-2xl font-bold text-[10px] uppercase tracking-tighter hover:bg-red-100 transition">Clear All Memory</button>
        </aside>

        <main class="main-workspace">
            <header class="header">
                <div class="flex flex-col">
                    <span class="text-xs font-bold text-slate-400">TITAN CORE v5.6</span>
                    <span id="user-display-name" class="text-[10px] font-black text-blue-500 uppercase tracking-widest">User: Loading...</span>
                </div>
                <div class="flex items-center gap-6">
                    <span id="status" class="hidden text-xs italic text-blue-500 animate-pulse">analyzing...</span>
                    <button onclick="toggleDarkMode()" class="text-xl hover:scale-110 transition" id="theme-icon">☀️</button>
                    <div class="id-circle" id="user-initials" onclick="toggleSettingsModal()">??</div>
                </div>
            </header>

            <div id="chat-stream" class="chat-stream"></div>

            <footer class="input-dock">
                <div class="input-pill shadow-sm">
                    <button class="p-2 text-slate-400 hover:text-blue-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                    </button>
                    <input type="text" id="user-msg" placeholder="Command Titan Core..." onkeypress="handleEnter(event)">
                    <button onclick="handleSend()" class="send-btn shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    </button>
                </div>
            </footer>
        </main>

        <div id="user-settings-modal">
            <h3 class="font-black text-xs text-blue-600 uppercase tracking-widest mb-4">Account Settings</h3>
            <div class="space-y-3">
                <div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-xl">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Status</p>
                    <p class="text-xs font-bold" id="pro-status-label">Free Member</p>
                </div>
                <button onclick="logout()" class="w-full py-3 bg-red-500 text-white rounded-xl font-bold text-xs hover:bg-red-600 transition">Logout Session</button>
            </div>
        </div>

        <div id="payment-modal" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center;">
            <div class="bg-white dark:bg-slate-800 p-8 rounded-[40px] w-[380px] text-center border border-blue-500 shadow-2xl relative">
                <button onclick="closePayment()" class="absolute right-6 top-6 text-slate-400">✕</button>
                <h2 class="text-2xl font-black mb-1">NEXA PRO</h2>
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest mb-6">Unlock Professional AI</p>
                <div class="bg-green-50 dark:bg-green-900/20 p-4 rounded-2xl mb-4 text-left border border-green-200">
                    <p class="text-[10px] uppercase font-black text-green-600">Easypaisa (Rs. 500)</p>
                    <p class="font-bold text-lg">03XX-XXXXXXX</p>
                </div>
                <input type="text" placeholder="Transaction ID" class="auth-input">
                <button onclick="processPayment()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold mt-2 shadow-lg">Verify Payment</button>
            </div>
        </div>
    </div>

    <script>
        const BACKUP_KEY = "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";
        const API_URL = "https://api.groq.com/openai/v1/chat/completions";

        let history = JSON.parse(localStorage.getItem('nexa_history')) || [];
        let currentUser = JSON.parse(localStorage.getItem('nexa_user')) || null;
        let isSignup = false;
        let isPro = localStorage.getItem('nexa_pro') === 'true';

        // --- AUTH LOGIC ---
        window.onload = () => {
            if(currentUser) {
                showApp();
            }
        };

        function toggleAuthUI() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('auth-ui-title').innerText = isSignup ? "Create Account" : "Welcome Back";
            document.getElementById('auth-main-btn').innerText = isSignup ? "Register Me" : "Login System";
            document.getElementById('auth-switch-text').innerText = isSignup ? "Already have an account?" : "New to Nexa?";
            document.getElementById('auth-switch-link').innerText = isSignup ? "Login" : "Create Account";
        }

        function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const name = isSignup ? document.getElementById('reg-name').value : (currentUser ? currentUser.name : "Guest");

            if(!email || !pass || (isSignup && !name)) return alert("Please fill all fields");

            // Mock Success
            currentUser = { name: name, email: email };
            localStorage.setItem('nexa_user', JSON.stringify(currentUser));
            showApp();
        }

        function showApp() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-app').style.visibility = 'visible';
            document.getElementById('user-display-name').innerText = `User: ${currentUser.name}`;
            document.getElementById('user-initials').innerText = currentUser.name.charAt(0);
            document.getElementById('pro-status-label').innerText = isPro ? "Pro Member" : "Free Member";
            
            updateHistoryUI();
            if(history.length === 0) {
                renderMessage('assistant', `Welcome ${currentUser.name}. Titan Core 5.6 initialized.`);
            } else {
                history.forEach(m => renderMessage(m.role, m.content));
            }
        }

        function logout() {
            localStorage.removeItem('nexa_user');
            location.reload();
        }

        // --- CHAT LOGIC ---
        function handleEnter(e) { if(e.key === 'Enter') handleSend(); }

        async function handleSend() {
            const input = document.getElementById('user-msg');
            const text = input.value.trim();
            const persona = document.getElementById('persona').value;
            
            if(!text) return;
            input.value = '';
            renderMessage('user', text);
            document.getElementById('status').classList.remove('hidden');

            // Image Logic
            const imgTriggers = ["generate image", "create image", "draw", "make a pic"];
            if(imgTriggers.some(t => text.toLowerCase().includes(t))) {
                const prompt = text.split(new RegExp(imgTriggers.join('|'), 'i')).pop().trim() || "modern ai";
                const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${Math.floor(Math.random()*1000)}`;
                setTimeout(() => {
                    renderMessage('assistant', `Core output for: **${prompt}**<br><img src="${imgUrl}" class="gen-image">`);
                    document.getElementById('status').classList.add('hidden');
                }, 1000);
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${BACKUP_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: `You are NexaAI. ${persona}`}, ...history.slice(-6), {role: "user", content: text}],
                        temperature: 0.7
                    })
                });
                const data = await response.json();
                let aiMsg = data.choices[0].message.content.replace(/\*/g, '');
                renderMessage('assistant', aiMsg);
                history.push({role: "user", content: text}, {role: "assistant", content: aiMsg});
                localStorage.setItem('nexa_history', JSON.stringify(history.slice(-20)));
                updateHistoryUI();
            } catch (e) {
                renderMessage('assistant', "System offline. Check uplink.");
            } finally {
                document.getElementById('status').classList.add('hidden');
            }
        }

        function renderMessage(role, text) {
            const stream = document.getElementById('chat-stream');
            const div = document.createElement('div');
            div.className = `bubble ${role === 'user' ? 'user-bubble' : 'ai-bubble'}`;
            div.innerHTML = role === 'assistant' ? (text.includes('<img') ? text : marked.parse(text)) : text;
            stream.appendChild(div);
            stream.scrollTop = stream.scrollHeight;
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            history.filter(m => m.role === 'user').reverse().slice(0, 5).forEach(m => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerText = m.content;
                item.onclick = () => { document.getElementById('user-msg').value = m.content; };
                list.appendChild(item);
            });
        }

        // --- UI HELPERS ---
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

        function handlePersonaChange(val) {
            if (val.includes("Professional") && !isPro) {
                document.getElementById('payment-modal').style.display = 'flex';
                document.getElementById('persona').value = "Friendly Mode. Helpful and warm.";
            }
        }

        function processPayment() {
            isPro = true;
            localStorage.setItem('nexa_pro', 'true');
            alert("Payment Verified! Professional mode unlocked.");
            location.reload();
        }

        function closePayment() { document.getElementById('payment-modal').style.display = 'none'; }
        
        function toggleSettingsModal() {
            const m = document.getElementById('user-settings-modal');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function clearHistory() { if(confirm("Wipe all system logs?")) { localStorage.removeItem('nexa_history'); location.reload(); } }
    </script>
</body>
</html>
